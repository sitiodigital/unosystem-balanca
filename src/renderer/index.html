<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Configuração da Balança</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <img src="unosystem.svg" alt="UnoSystem" class="logo" />
    <h1>Configuração da Balança <br><small id="appVersion" style="font-size: 10px; font-weight: normal;">Versão
        …</small>
    </h1>

    <form id="configForm">
      <div class="form-group">
        <label for="enderecoSistema">Endereço do Sistema</label>
        <input type="text" id="enderecoSistema" name="enderecoSistema" placeholder="" required />
      </div>

      <div class="form-group">
        <label for="pontoVenda">Ponto de Venda</label>
        <select id="pontoVenda" name="pontoVenda">
          <option value="">Preencha o endereço do sistema para carregar os pontos de venda.</option>
        </select>
      </div>

      <div class="form-group">
        <label for="portaSerial">Porta Serial</label>
        <select id="portaSerial" name="portaSerial" required>
          <option value="">Carregando portas...</option>
        </select>
        <button type="button" id="btnAtualizarPortas" class="btn-secondary">Atualizar Portas</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="baudRate">Taxa de Bits (Baud Rate)</label>
          <select id="baudRate" name="baudRate" required>
            <option value="9600" selected>9600 (Padrão Toledo 3 Ultra)</option>
            <option value="1200">1200</option>
            <option value="2400">2400</option>
            <option value="4800">4800</option>
            <option value="19200">19200</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dataBits">Bits de Dados</label>
          <select id="dataBits" name="dataBits" required>
            <option value="8" selected>8 (Padrão Toledo 3 Ultra)</option>
            <option value="7">7</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="parity">Paridade</label>
          <select id="parity" name="parity" required>
            <option value="none" selected>Nenhuma (Padrão Toledo 3 Ultra)</option>
            <option value="even">Par</option>
            <option value="odd">Ímpar</option>
          </select>
        </div>

        <div class="form-group">
          <label for="stopBits">Bits de Parada</label>
          <select id="stopBits" name="stopBits" required>
            <option value="1" selected>1 (Padrão Toledo 3 Ultra)</option>
            <option value="2">2</option>
          </select>
        </div>
      </div>

      <div class="button-group">
        <button type="button" id="btnTestar" class="btn-primary">Testar Conexão</button>
        <button type="submit" id="btnConectar" class="btn-success">Salvar e Prosseguir</button>
      </div>
    </form>

    <div id="statusMessage" class="status-message"></div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
